# Development compose — hot-reload for every component.
#
#   cp .env.example .env     # optional; dev defaults are pre-filled below
#   docker compose -f docker-compose.dev.yml up
#
# Profiles
#   (default)        postgres + backend + frontend
#   --profile agent  add the Rust agent (non-privileged, enroll/status only)
#   --profile system-agent  add agent with apt access (privileged)
#   --profile monitoring    add Prometheus + Grafana
#   --profile proxy  add Nginx reverse-proxy with SSL termination
#
# Ports
#   5432  PostgreSQL
#   8080  Go backend (REST + WebSocket)
#   9090  Go backend Prometheus metrics
#   5173  Vite dev server (frontend)
#   9091  Prometheus UI (monitoring profile)
#   3001  Grafana        (monitoring profile)
#   80/443 Nginx         (proxy profile)

services:
  # ── PostgreSQL ─────────────────────────────────────────────────────────────
  postgres:
    image: postgres:15-alpine
    container_name: uau-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-uau}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-uau}
      POSTGRES_DB: ${POSTGRES_DB:-uau_db}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-uau} -d ${POSTGRES_DB:-uau_db}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - uau-network

  # ── Go Backend (hot-reload via Air) ────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    container_name: uau-backend
    restart: unless-stopped
    ports:
      - "8080:8080"
      - "9090:9090"   # Prometheus metrics
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-uau}:${POSTGRES_PASSWORD:-uau}@postgres:5432/${POSTGRES_DB:-uau_db}?sslmode=disable
      ADMIN_USERNAME: ${ADMIN_USERNAME:-admin}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-change-me-please}
      ENROLLMENT_TOKEN: ${ENROLLMENT_TOKEN:-dev-enrollment-token}
      API_PORT: 8080
      ENVIRONMENT: development
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:5173}
      LOG_LEVEL: debug
    volumes:
      - ./backend:/app
      - backend_logs:/var/log/ubuntu-auto-update
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/api/v1/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 15s
    networks:
      - uau-network

  # ── React Frontend (Vite dev server) ───────────────────────────────────────
  frontend:
    build:
      context: ./web
      dockerfile: Dockerfile.dev
    container_name: uau-frontend
    restart: unless-stopped
    ports:
      - "5173:5173"
    depends_on:
      backend:
        condition: service_healthy
    environment:
      # Vite env vars (must be prefixed VITE_ to be visible in the browser bundle)
      VITE_API_URL: ""                              # empty = same-origin proxy
      VITE_WS_URL: ""
      VITE_PROXY_TARGET: http://backend:8080
      CHOKIDAR_USEPOLLING: "true"                   # reliable file-watch in Docker
    volumes:
      - ./web:/app
      - /app/node_modules                           # named anon volume prevents host override
    networks:
      - uau-network

  # ── Rust Agent (enroll / status, non-privileged) ───────────────────────────
  agent:
    build:
      context: ./agent
      dockerfile: Dockerfile
    container_name: uau-agent
    restart: "no"
    depends_on:
      backend:
        condition: service_healthy
    environment:
      BACKEND_URL: http://backend:8080
      ENROLLMENT_TOKEN: ${ENROLLMENT_TOKEN:-dev-enrollment-token}
      RUST_LOG: debug
      UA_LOGGING__LEVEL: debug
      UA_LOGGING__FORMAT: json
    volumes:
      - agent_config:/etc/ubuntu-auto-update
      - agent_logs:/var/log/ubuntu-auto-update
    networks:
      - uau-network
    profiles:
      - agent

  # ── Rust Agent (privileged — runs apt on the host) ─────────────────────────
  agent-system:
    build:
      context: ./agent
      dockerfile: Dockerfile
    container_name: uau-agent-system
    restart: "no"
    user: root
    privileged: true
    depends_on:
      backend:
        condition: service_healthy
    environment:
      BACKEND_URL: http://backend:8080
      ENROLLMENT_TOKEN: ${ENROLLMENT_TOKEN:-dev-enrollment-token}
      RUST_LOG: info
      UA_LOGGING__LEVEL: info
      UA_LOGGING__FORMAT: json
    volumes:
      - agent_config:/etc/ubuntu-auto-update
      - agent_logs:/var/log/ubuntu-auto-update
      - /var/lib/apt:/var/lib/apt
      - /var/cache/apt:/var/cache/apt
      - /etc/apt:/etc/apt:ro
    networks:
      - uau-network
    profiles:
      - system-agent

  # ── Prometheus ─────────────────────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:latest
    container_name: uau-prometheus
    restart: unless-stopped
    ports:
      - "9091:9090"
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=15d"
      - "--web.enable-lifecycle"
    volumes:
      - ./observability/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    networks:
      - uau-network
    profiles:
      - monitoring

  # ── Grafana ────────────────────────────────────────────────────────────────
  grafana:
    image: grafana/grafana:latest
    container_name: uau-grafana
    restart: unless-stopped
    ports:
      - "3001:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GF_ADMIN_PASSWORD:-admin}
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./observability/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./observability/grafana/dashboards:/var/lib/grafana/dashboards:ro
    networks:
      - uau-network
    profiles:
      - monitoring

  # ── Nginx (reverse proxy + SSL termination) ────────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: uau-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./infrastructure/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./infrastructure/nginx/ssl:/etc/nginx/ssl:ro
    depends_on:
      - backend
      - frontend
    networks:
      - uau-network
    profiles:
      - proxy

volumes:
  postgres_data:
  backend_logs:
  agent_config:
  agent_logs:
  prometheus_data:
  grafana_data:

networks:
  uau-network:
    driver: bridge
    name: ubuntu-auto-update