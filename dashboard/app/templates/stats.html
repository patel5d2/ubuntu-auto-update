<!doctype html>
<html lang="en" data-bs-theme="light">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Ubuntu Auto-Update Dashboard - Stats</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
  <div id="app">
    <nav class="navbar navbar-expand-lg bg-body-tertiary border-bottom">
      <div class="container-fluid">
        <a class="navbar-brand" href="/">Ubuntu Auto-Update Dashboard</a>
        <div class="ms-auto d-flex align-items-center">
          <a href="/" class="btn btn-sm btn-outline-secondary me-2">Dashboard</a>
          <a href="/config" class="btn btn-sm btn-outline-secondary">Config</a>
        </div>
      </div>
    </nav>

    <main class="container-fluid mt-4">
      <div class="d-flex justify-content-end mb-3">
        <small class="text-muted me-3">Last updated: {{ lastUpdated }}</small>
        <button class="btn btn-sm btn-outline-secondary" @click="fetchStats">Refresh</button>
      </div>
      <div class="row">
        <div class="col-lg-6">
          <div class="card">
            <div class="card-header">Updates by Server</div>
            <div class="card-body">
              <canvas id="server-chart"></canvas>
            </div>
          </div>
        </div>
        <div class="col-lg-6">
          <div class="card">
            <div class="card-header">Updates by Date</div>
            <div class="card-body">
              <canvas id="date-chart"></canvas>
            </div>
          </div>
        </div>
      </div>
    </main>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="https://unpkg.com/vue@3"></script>
  <script>
    const { createApp } = Vue

    createApp({
      data() {
        return {
          stats: { server_status: [], date_status: [] },
          lastUpdated: ''
        }
      },
      methods: {
        async fetchStats() {
          const response = await fetch('/api/v1/stats', { headers: { 'X-API-Key': localStorage.getItem('apiKey') } })
          this.stats = await response.json()
          this.renderCharts()
          this.lastUpdated = new Date().toLocaleString()
        },
        renderCharts() {
          // Server chart
          const serverCtx = document.getElementById('server-chart').getContext('2d')
          new Chart(serverCtx, {
            type: 'bar',
            data: {
              labels: this.stats.server_status.map(s => s.server),
              datasets: [
                {
                  label: 'Success',
                  data: this.stats.server_status.filter(s => s.status === 'success').map(s => s.count),
                  backgroundColor: 'rgba(75, 192, 192, 0.2)',
                  borderColor: 'rgba(75, 192, 192, 1)',
                  borderWidth: 1
                },
                {
                  label: 'Error',
                  data: this.stats.server_status.filter(s => s.status === 'error').map(s => s.count),
                  backgroundColor: 'rgba(255, 99, 132, 0.2)',
                  borderColor: 'rgba(255, 99, 132, 1)',
                  borderWidth: 1
                }
              ]
            }
          })

          // Date chart
          const dateCtx = document.getElementById('date-chart').getContext('2d')
          new Chart(dateCtx, {
            type: 'line',
            data: {
              labels: this.stats.date_status.map(s => s.date),
              datasets: [
                {
                  label: 'Success',
                  data: this.stats.date_status.filter(s => s.status === 'success').map(s => s.count),
                  backgroundColor: 'rgba(75, 192, 192, 0.2)',
                  borderColor: 'rgba(75, 192, 192, 1)',
                  borderWidth: 1
                },
                {
                  label: 'Error',
                  data: this.stats.date_status.filter(s => s.status === 'error').map(s => s.count),
                  backgroundColor: 'rgba(255, 99, 132, 0.2)',
                  borderColor: 'rgba(255, 99, 132, 1)',
                  borderWidth: 1
                }
              ]
            }
          })
        }
      },
      mounted() {
        this.fetchStats()
      }
    }).mount('#app')
  </script>
</body>
</html>
