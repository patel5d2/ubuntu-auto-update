name: CI Pipeline

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  GO_VERSION: '1.26'
  RUST_TOOLCHAIN: 'stable'
  NODE_VERSION: '22'

jobs:
  # ── Go Backend ────────────────────────────────────────────────────────────
  go-lint:
    name: Go Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}
          cache-dependency-path: backend/go.sum
      - name: golangci-lint
        uses: golangci/golangci-lint-action@v8
        with:
          working-directory: backend
          version: latest
      - name: go vet
        run: go vet ./...
        working-directory: backend
      - name: staticcheck
        run: |
          go install honnef.co/go/tools/cmd/staticcheck@latest
          staticcheck ./...
        working-directory: backend

  go-test:
    name: Go Test
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: test_db
        ports: ['5432:5432']
        options: --health-cmd "pg_isready -U test" --health-interval 10s --health-timeout 5s --health-retries 5
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}
          cache-dependency-path: backend/go.sum
      - name: Run tests
        working-directory: backend
        env:
          DATABASE_URL: postgres://test:test@localhost:5432/test_db?sslmode=disable
        run: go test -race -coverprofile=coverage.out -covermode=atomic ./...
      - name: Upload coverage
        uses: actions/upload-artifact@v7
        with:
          name: go-coverage
          path: backend/coverage.out

  go-security:
    name: Go Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}
          cache-dependency-path: backend/go.sum
      - name: govulncheck
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          govulncheck ./...
        working-directory: backend
      - name: gosec
        run: |
          go install github.com/securego/gosec/v2/cmd/gosec@latest
          gosec -exclude=G104 ./...
        working-directory: backend

  # ── Rust Agent ────────────────────────────────────────────────────────────
  rust-lint:
    name: Rust Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
      - name: cargo fmt
        run: cargo fmt --check
        working-directory: agent
      - name: cargo clippy
        run: cargo clippy --all-targets --all-features -- -D warnings
        working-directory: agent

  rust-test:
    name: Rust Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
      - name: cargo test
        run: cargo test --all-features
        working-directory: agent
      - name: cargo audit
        run: |
          cargo install cargo-audit
          cargo audit
        working-directory: agent

  # ── Web Frontend ──────────────────────────────────────────────────────────
  web-lint-test:
    name: Web Lint & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: web/package-lock.json
      - name: Install dependencies
        run: npm ci
        working-directory: web
      - name: TypeScript check
        run: npx tsc --noEmit
        working-directory: web
      - name: Run tests
        run: npm test
        working-directory: web
      - name: Build check
        run: npm run build
        working-directory: web

  # ── Container Build & Scan ────────────────────────────────────────────────
  docker-build:
    name: Docker Build & Scan
    runs-on: ubuntu-latest
    needs: [go-test, rust-test, web-lint-test]
    steps:
      - uses: actions/checkout@v5
      - uses: docker/setup-buildx-action@v3
      - name: Build image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          load: true
          tags: uau:ci-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - name: Trivy vulnerability scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: uau:ci-${{ github.sha }}
          format: table
          exit-code: '1'
          severity: CRITICAL,HIGH

  # ── Integration Smoke Test ────────────────────────────────────────────────
  integration:
    name: Integration E2E (real SSH target)
    runs-on: ubuntu-latest
    needs: [docker-build]
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v5
      # Boots the production compose stack under an isolated project name,
      # enrolls an sshd container as a managed host, and drives the real
      # product flow: password bootstrap, playbook stop-on-failure, a real
      # apt-get update run, and webhook dispatch. The script tears down its
      # own stack (trap EXIT), so no separate teardown step is needed.
      - name: Run end-to-end suite
        run: ./scripts/e2e.sh
