name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write
  packages: write
  id-token: write  # for cosign OIDC

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # ── Build Rust Agent Binaries ─────────────────────────────────────────────
  build-agent:
    name: Build Agent (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            artifact: ua-agent-linux-amd64
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            artifact: ua-agent-linux-arm64
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - name: Install cross-compilation tools
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu
      - name: Build release binary
        working-directory: agent
        env:
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: aarch64-linux-gnu-gcc
        run: cargo build --release --target ${{ matrix.target }}
      - name: Package
        run: |
          mkdir -p dist
          cp agent/target/${{ matrix.target }}/release/ua-agent dist/${{ matrix.artifact }}
          cd dist
          sha256sum ${{ matrix.artifact }} > ${{ matrix.artifact }}.sha256
      - uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.artifact }}
          path: dist/

  # ── Build & Push Docker Image ─────────────────────────────────────────────
  build-image:
    name: Build & Push Container Image
    runs-on: ubuntu-latest
    outputs:
      digest: ${{ steps.push.outputs.digest }}
    steps:
      - uses: actions/checkout@v5
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix=sha-,format=short
            type=raw,value=latest
      - name: Build and push
        id: push
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── Sign Container Image ─────────────────────────────────────────────────
  sign-image:
    name: Sign Image (cosign)
    needs: build-image
    runs-on: ubuntu-latest
    steps:
      - uses: sigstore/cosign-installer@v3
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      # Sign by digest: the semver image tags strip the leading v
      # (v1.2.3 → 1.2.3), so signing by github.ref_name would target a tag
      # that doesn't exist. The digest is also the stronger reference.
      - name: Sign image
        env:
          COSIGN_EXPERIMENTAL: 1
        run: |
          IMAGE="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}"
          DIGEST="${{ needs.build-image.outputs.digest }}"
          cosign sign --yes "${IMAGE}@${DIGEST}"

  # ── Create GitHub Release ─────────────────────────────────────────────────
  release:
    name: Create GitHub Release
    needs: [build-agent, build-image, sign-image]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/download-artifact@v8
        with:
          path: dist/
          merge-multiple: true
          # Only the agent binaries: docker/build-push-action auto-uploads a
          # .dockerbuild build-record artifact that fails to download and has
          # no business in the release assets anyway.
          pattern: ua-agent-*
      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: dist/*
          body: |
            ## Installation

            ### Docker
            ```bash
            docker pull ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.ref_name }}
            ```

            ### Agent Binary
            ```bash
            # AMD64
            curl -LO https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/ua-agent-linux-amd64
            chmod +x ua-agent-linux-amd64
            sudo mv ua-agent-linux-amd64 /usr/local/bin/ua-agent

            # ARM64
            curl -LO https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/ua-agent-linux-arm64
            chmod +x ua-agent-linux-arm64
            sudo mv ua-agent-linux-arm64 /usr/local/bin/ua-agent
            ```
