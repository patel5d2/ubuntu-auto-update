# Grafana Dashboard Provisioning — auto-loads JSON dashboards on startup.
apiVersion: 1

providers:
  - name: 'default'
    orgId: 1
    folder: 'Ubuntu Auto-Update'
    type: file
    disableDeletion: false
    updateIntervalSeconds: 30
    allowUiUpdates: true
    options:
      path: /var/lib/grafana/dashboards
      foldersFromFilesStructure: false
