# Production compose — single "dark container" that serves both the React
# frontend (as embedded static assets) and the Go API.
#
#   cp .env.example .env       # fill in secrets
#   docker compose up -d
#
#   Web UI + API:  http://localhost:8080
#   Health check:  http://localhost:8080/api/v1/health
#
# The root Dockerfile builds one image: React bundle is copied into /app/public
# and the Go backend serves it from that path.  No separate nginx container needed.

services:
  postgres:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-uau}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-uau}
      POSTGRES_DB: ${POSTGRES_DB:-uau_db}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-uau} -d ${POSTGRES_DB:-uau_db}"]
      interval: 5s
      timeout: 3s
      retries: 10

  app:
    # Local builds and the published image share this tag, so both paths work:
    #   build+run:     docker compose up -d --build
    #   pull-and-run:  docker compose pull app && docker compose up -d --no-build
    image: ghcr.io/patel5d2/ubuntu-auto-update:latest
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-uau}:${POSTGRES_PASSWORD:-uau}@postgres:5432/${POSTGRES_DB:-uau_db}?sslmode=disable
      ADMIN_USERNAME: ${ADMIN_USERNAME:?ADMIN_USERNAME must be set in .env}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:?ADMIN_PASSWORD must be set in .env}
      ENROLLMENT_TOKEN: ${ENROLLMENT_TOKEN:?ENROLLMENT_TOKEN must be set in .env}
      API_PORT: 8080
      ENVIRONMENT: ${ENVIRONMENT:-development}
      ENCRYPTION_KEY_FILE: /app/keys/encryption.key
      # CORS: same-origin requests from the browser never need CORS headers,
      # but agent enrollments come from external IPs so keep this configurable.
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-}
    volumes:
      - app_keys:/app/keys
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/api/v1/health"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 15s

volumes:
  postgres_data:
  app_keys:
